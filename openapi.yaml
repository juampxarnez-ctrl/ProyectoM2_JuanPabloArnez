openapi: 3.0.3
info:
  title: MiniBlog API
  version: 1.0.0
  description: |
    API REST para gestionar authors y posts.

    Incluye operaciones CRUD, validaciones básicas, documentación Swagger/OpenAPI
    y manejo de errores comunes.

    Errores frecuentes documentados:
    - 400: faltan campos obligatorios
    - 404: recurso no encontrado
    - 500: error interno o de base de datos
    - error de foreign key cuando author_id no existe

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://proyectom2juanpabloarnez-production.up.railway.app
    description: Servidor desplegado en Railway

tags:
  - name: Authors
    description: Operaciones CRUD sobre authors
  - name: Posts
    description: Operaciones CRUD sobre posts

paths:
  /:
    get:
      summary: Verificar estado de la API
      responses:
        '200':
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /authors:
    get:
      tags:
        - Authors
      summary: Obtener todos los authors
      responses:
        '200':
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

    post:
      tags:
        - Authors
      summary: Crear un author
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Author creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemplo:
                  value:
                    error: name y email son obligatorios
        '500':
          description: Error interno o de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /authors/{id}:
    get:
      tags:
        - Authors
      summary: Obtener author por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemplo:
                  value:
                    error: Author no encontrado

    put:
      tags:
        - Authors
      summary: Actualizar author por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '200':
          description: Author actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Authors
      summary: Eliminar author por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Author eliminado correctamente
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts:
    get:
      tags:
        - Posts
      summary: Obtener todos los posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/Post'
                    - $ref: '#/components/schemas/PostWithAuthor'

    post:
      tags:
        - Posts
      summary: Crear un post
      description: |
        Crea un nuevo post.

        Validaciones:
        - title obligatorio
        - content obligatorio
        - author_id obligatorio

        Si author_id no existe, PostgreSQL puede devolver error de foreign key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemplo:
                  value:
                    error: faltan campos
        '500':
          description: Error interno, de base de datos o foreign key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/{id}:
    get:
      tags:
        - Posts
      summary: Obtener post por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ejemplo:
                  value:
                    error: Post no encontrado

    put:
      tags:
        - Posts
      summary: Actualizar post por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Post actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno o de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Posts
      summary: Eliminar post por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Post eliminado correctamente
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/author/{authorId}:
    get:
      tags:
        - Posts
      summary: Obtener posts por author
      description: Devuelve los posts de un author usando JOIN.
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostWithAuthor'
        '404':
          description: Author o posts no encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno o de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        example: 1

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Autor de prueba
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Autor de prueba

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true

    PostWithAuthor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'
        author_name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Post no encontrado