openapi: 3.0.3
info:
  title: MiniBlog API
  version: 1.0.0
  description: |
    API REST para gestionar authors y posts.

    Esta API fue desarrollada con Node.js, Express y PostgreSQL.
    Incluye operaciones CRUD para authors y posts, validaciones básicas,
    documentación Swagger/OpenAPI y manejo de errores comunes.

    Errores frecuentes documentados:
    - 400: faltan campos obligatorios
    - 404: recurso no encontrado
    - 500: error interno o de base de datos
    - posts con author_id inexistente pueden generar error de foreign key

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://proyectom2juanpabloarnez-production.up.railway.app
    description: Servidor en Railway

tags:
  - name: Authors
    description: Operaciones CRUD sobre authors
  - name: Posts
    description: Operaciones CRUD sobre posts

paths:
  /:
    get:
      summary: Verificar estado de la API
      description: Endpoint base para comprobar que la API está corriendo.
      responses:
        '200':
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /authors:
    get:
      tags:
        - Authors
      summary: Obtener todos los authors
      description: Devuelve una lista de authors registrados.
      responses:
        '200':
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

    post:
      tags:
        - Authors
      summary: Crear un author
      description: |
        Crea un nuevo author.

        Validaciones:
        - name obligatorio
        - email obligatorio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
            examples:
              ejemploValido:
                summary: Author válido
                value:
                  name: Juan Pablo
                  email: juan@mail.com
                  bio: Autor de prueba
              ejemploInvalido:
                summary: Body incompleto
                value:
                  bio: Sin nombre ni email
      responses:
        '201':
          description: Author creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                faltanCampos:
                  value:
                    error: name y email son obligatorios
        '500':
          description: Error interno o de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /authors/{id}:
    get:
      tags:
        - Authors
      summary: Obtener author por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Author no encontrado
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Authors
      summary: Actualizar author por ID
      description: Actualiza name, email y bio de un author existente.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
            examples:
              ejemploValido:
                value:
                  name: Juan Pablo Updated
                  email: juan.updated@mail.com
                  bio: Bio actualizada
              ejemploInvalido:
                value:
                  name: ""
      responses:
        '200':
          description: Author actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                faltanCampos:
                  value:
                    error: name y email son obligatorios
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Author no encontrado
        '500':
          description: Error interno o error de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Authors
      summary: Eliminar author por ID
      description: Elimina un author. Si existen posts relacionados y la FK está configurada con cascade, también se eliminan.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Author eliminado correctamente
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Author no encontrado
        '500':
          description: Error interno o de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts:
    get:
      tags:
        - Posts
      summary: Obtener todos los posts
      description: Devuelve la lista completa de posts.
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/Post'
                    - $ref: '#/components/schemas/PostWithAuthor'

    post:
      tags:
        - Posts
      summary: Crear un post
      description: |
        Crea un nuevo post.

        Validaciones:
        - title obligatorio
        - content obligatorio
        - author_id obligatorio

        Posibles problemas detectados durante el desarrollo:
        - si author_id no existe, PostgreSQL puede devolver error de foreign key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
            examples:
              ejemploValido:
                value:
                  title: Mi primer post
                  content: Este es el contenido del post
                  author_id: 1
                  published: true
              ejemploInvalido:
                value:
                  title: Sin contenido
      responses:
        '201':
          description: Post creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                faltanCampos:
                  value:
                    error: faltan campos
        '500':
          description: Error interno o error de foreign key / base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                foreignKey:
                  value:
                    error: insert or update on table "posts" violates foreign key constraint

  /posts/{id}:
    get:
      tags:
        - Posts
      summary: Obtener post por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Post no encontrado
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Posts
      summary: Actualizar post por ID
      description: |
        Actualiza un post existente.

        Posibles errores que se documentan porque aparecieron durante el desarrollo:
        - 400 si faltan campos
        - 404 si el post no existe
        - 500 si updatePost no estaba implementado o hay error SQL
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
            examples:
              ejemploValido:
                value:
                  title: Post actualizado
                  content: Contenido actualizado
                  author_id: 1
                  published: false
      responses:
        '200':
          description: Post actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                faltanCampos:
                  value:
                    error: faltan campos
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Post no encontrado
        '500':
          description: Error interno o error de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Posts
      summary: Eliminar post por ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Post eliminado correctamente
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noEncontrado:
                  value:
                    error: Post no encontrado
        '500':
          description: Error interno o error de base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/author/{authorId}:
    get:
      tags:
        - Posts
      summary: Obtener posts por author
      description: |
        Devuelve todos los posts de un author específico.
        En este proyecto se utilizó JOIN para enriquecer la respuesta con datos del author.
      parameters:
        - name: authorId
          in: path
          required: true
          description: ID del author
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostWithAuthor'
        '404':
          description: Author o posts no encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno o error en JOIN / base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID numérico del recurso
      schema:
        type: integer
        example: 1

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Autor de prueba
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Autor de prueba

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true

    PostWithAuthor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Este es el contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-27T12:00:00.000Z'
        author_name:
          type: string
          example: Juan Pablo
        email:
          type: string
          example: juan@mail.com

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Post no encontrado